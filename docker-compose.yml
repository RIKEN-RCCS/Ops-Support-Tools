name: ops-support-tools

x-support-secret-env: &support-secret-env
  TZ: ${OPS_SUPPORT_TOOLS_TZ:-UTC}
  SUPPORT_AI_WEBHOOK_TOKEN_FILE: /run/secrets/support_ai_webhook_token
  LLM_API_KEY_FILE: /run/secrets/llm_api_key
  ZENDESK_RELAY_URL: http://zendesk-rccs:8080
  ZENDESK_RELAY_TOKEN_FILE: /run/secrets/zendesk_rccs_relay_token
  SUPPORT_AI_QUEUE_KEY_FILE: /run/secrets/support_ai_queue_key
  SUPPORT_AI_KNOWLEDGE_API_URL: http://knowledge-api:8080
  SUPPORT_AI_CREATE_KNOWLEDGE_RUNS: "1"

x-support-secrets: &support-secrets
  - llm_api_key
  - zendesk_rccs_relay_token
  - support_ai_webhook_token
  - support_ai_queue_key

services:
  webhook:
    build: ./apps/zendesk-support-ai
    command: ["python", "webhook.py", "--host", "0.0.0.0", "--port", "8080"]
    user: "10001:1000"
    env_file:
      - path: ./apps/zendesk-support-ai/.env
        required: false
    environment: *support-secret-env
    secrets: *support-secrets
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - ./apps/zendesk-support-ai/data:/data/queue
      - ./apps/zendesk-support-ai/config:/config
    restart: unless-stopped
    depends_on:
      - knowledge-api
      - zendesk-rccs

  generator:
    build: ./apps/zendesk-support-ai
    command: ["python", "generator.py", "-v", "--interval", "30"]
    user: "10001:1000"
    env_file:
      - path: ./apps/zendesk-support-ai/.env
        required: false
    environment: *support-secret-env
    secrets: *support-secrets
    volumes:
      - ./apps/zendesk-support-ai/data:/data/queue
      - ./apps/zendesk-support-ai/config:/config
    restart: unless-stopped
    depends_on:
      - knowledge-api
      - zendesk-rccs

  poster:
    build: ./apps/zendesk-support-ai
    command: ["python", "poster.py", "-v", "--interval", "30"]
    user: "10001:1000"
    env_file:
      - path: ./apps/zendesk-support-ai/.env
        required: false
    environment: *support-secret-env
    secrets: *support-secrets
    volumes:
      - ./apps/zendesk-support-ai/data:/data/queue
      - ./apps/zendesk-support-ai/config:/config
    restart: unless-stopped
    depends_on:
      - zendesk-rccs

  followup:
    build: ./apps/zendesk-support-ai
    command: ["python", "followup.py", "-v", "--interval", "30"]
    user: "10001:1000"
    env_file:
      - path: ./apps/zendesk-support-ai/.env
        required: false
    environment: *support-secret-env
    secrets: *support-secrets
    volumes:
      - ./apps/zendesk-support-ai/data:/data/queue
      - ./apps/zendesk-support-ai/config:/config
    restart: unless-stopped
    depends_on:
      - zendesk-rccs

  followup-responder:
    build: ./apps/zendesk-support-ai
    command: ["python", "followup_responder.py", "-v", "--interval", "30"]
    user: "10001:1000"
    env_file:
      - path: ./apps/zendesk-support-ai/.env
        required: false
    environment: *support-secret-env
    secrets: *support-secrets
    volumes:
      - ./apps/zendesk-support-ai/data:/data/queue
      - ./apps/zendesk-support-ai/config:/config
    restart: unless-stopped
    depends_on:
      - zendesk-rccs

  runbook-worker:
    build: ./apps/zendesk-support-ai
    command: ["python", "runbook_worker.py", "-v", "--interval", "60"]
    user: "10001:1000"
    env_file:
      - path: ./apps/zendesk-support-ai/.env
        required: false
    environment: *support-secret-env
    secrets: *support-secrets
    volumes:
      - ./apps/zendesk-support-ai/data:/data/queue
      - ./apps/zendesk-support-ai/config:/config
    restart: unless-stopped
    depends_on:
      - knowledge-api
      - zendesk-rccs

  runbook-review-worker:
    build: ./apps/zendesk-support-ai
    command: ["python", "runbook_review_worker.py", "-v", "--interval", "60"]
    user: "10001:1000"
    env_file:
      - path: ./apps/zendesk-support-ai/.env
        required: false
    environment: *support-secret-env
    secrets: *support-secrets
    volumes:
      - ./apps/zendesk-support-ai/data:/data/queue
      - ./apps/zendesk-support-ai/config:/config
    restart: unless-stopped
    depends_on:
      - knowledge-api
      - zendesk-rccs

  investigation-router-worker:
    build: ./apps/zendesk-support-ai
    command: ["python", "investigation_router_worker.py", "-v", "--interval", "60"]
    user: "10001:1000"
    env_file:
      - path: ./apps/zendesk-support-ai/.env
        required: false
    environment: *support-secret-env
    secrets: *support-secrets
    volumes:
      - ./apps/zendesk-support-ai/data:/data/queue
      - ./apps/zendesk-support-ai/config:/config
    restart: unless-stopped
    depends_on:
      - knowledge-api
      - zendesk-rccs

  knowledge-research-worker:
    build: ./apps/zendesk-support-ai
    command: ["python", "knowledge_research_worker.py", "-v", "--interval", "60"]
    user: "10001:1000"
    env_file:
      - path: ./apps/zendesk-support-ai/.env
        required: false
    environment: *support-secret-env
    secrets: *support-secrets
    volumes:
      - ./apps/zendesk-support-ai/data:/data/queue
      - ./apps/zendesk-support-ai/config:/config
    restart: unless-stopped
    depends_on:
      - knowledge-api
      - zendesk-rccs

  real-machine-task-splitter-worker:
    build: ./apps/zendesk-support-ai
    command: ["python", "real_machine_task_splitter_worker.py", "-v", "--interval", "60"]
    user: "10001:1000"
    env_file:
      - path: ./apps/zendesk-support-ai/.env
        required: false
    environment: *support-secret-env
    secrets: *support-secrets
    volumes:
      - ./apps/zendesk-support-ai/data:/data/queue
      - ./apps/zendesk-support-ai/config:/config
    restart: unless-stopped
    depends_on:
      - knowledge-api
      - zendesk-rccs

  answer-synthesis-worker:
    build: ./apps/zendesk-support-ai
    command: ["python", "answer_synthesis_worker.py", "-v", "--interval", "60"]
    user: "10001:1000"
    env_file:
      - path: ./apps/zendesk-support-ai/.env
        required: false
    environment: *support-secret-env
    secrets: *support-secrets
    volumes:
      - ./apps/zendesk-support-ai/data:/data/queue
      - ./apps/zendesk-support-ai/config:/config
    restart: unless-stopped
    depends_on:
      - knowledge-api
      - zendesk-rccs

  knowledge-api:
    build: ./apps/knowledge-api
    user: "10002:1000"
    secrets:
      - knowledge_field_key
      - knowledge_api_write_token
    environment:
      TZ: ${OPS_SUPPORT_TOOLS_TZ:-UTC}
      KNOWLEDGE_API_WRITE_TOKEN_FILE: /run/secrets/knowledge_api_write_token
    ports:
      - "127.0.0.1:18180:8080"
    volumes:
      - ./apps/knowledge-api/data:/data
    restart: unless-stopped

  zendesk-fugaku:
    build: ./apps/zendesk_fugaku
    user: "10003:1000"
    env_file:
      - path: ./apps/zendesk_fugaku/.env
        required: false
    environment:
      TZ: ${OPS_SUPPORT_TOOLS_TZ:-UTC}
      ZENDESK_FUGAKU_OAUTH_CLIENT_SECRET_FILE: /run/secrets/zendesk_fugaku_oauth_client_secret
      ZENDESK_FUGAKU_RELAY_TOKEN_FILE: /run/secrets/zendesk_fugaku_relay_token
      ZENDESK_FUGAKU_OAUTH_TOKEN_BUNDLE_FILE: /data/zendesk_oauth_token_bundle.json
      ZENDESK_FUGAKU_DB_FILE: /data/events.sqlite
    secrets:
      - zendesk_fugaku_oauth_client_secret
      - zendesk_fugaku_relay_token
    ports:
      - "127.0.0.1:18280:8080"
    volumes:
      - ./apps/zendesk_fugaku/data:/data
    restart: unless-stopped

  zendesk-rccs:
    build: ./apps/zendesk_rccs
    user: "10004:1000"
    env_file:
      - path: ./apps/zendesk_rccs/.env
        required: false
    environment:
      TZ: ${OPS_SUPPORT_TOOLS_TZ:-UTC}
      ZENDESK_RCCS_OAUTH_CLIENT_SECRET_FILE: /run/secrets/zendesk_rccs_oauth_client_secret
      ZENDESK_RCCS_RELAY_TOKEN_FILE: /run/secrets/zendesk_rccs_relay_token
      ZENDESK_RCCS_OAUTH_TOKEN_BUNDLE_FILE: /data/zendesk_oauth_token_bundle.json
      ZENDESK_RCCS_DB_FILE: /data/events.sqlite
    secrets:
      - zendesk_rccs_oauth_client_secret
      - zendesk_rccs_relay_token
    ports:
      - "127.0.0.1:18380:8080"
    volumes:
      - ./apps/zendesk_rccs/data:/data
    restart: unless-stopped

secrets:
  llm_api_key:
    file: ./apps/zendesk-support-ai/secrets/llm_api_key
  support_ai_webhook_token:
    file: ./apps/zendesk-support-ai/secrets/support_ai_webhook_token
  support_ai_queue_key:
    file: ./apps/zendesk-support-ai/secrets/support_ai_queue_key
  knowledge_field_key:
    file: ./apps/knowledge-api/secrets/knowledge_field_key
  knowledge_api_write_token:
    file: ./apps/knowledge-api/secrets/knowledge_api_write_token
  zendesk_fugaku_oauth_client_secret:
    file: ./apps/zendesk_fugaku/secrets/zendesk_fugaku_oauth_client_secret
  zendesk_fugaku_relay_token:
    file: ./apps/zendesk_fugaku/secrets/zendesk_fugaku_relay_token
  zendesk_rccs_oauth_client_secret:
    file: ./apps/zendesk_rccs/secrets/zendesk_rccs_oauth_client_secret
  zendesk_rccs_relay_token:
    file: ./apps/zendesk_rccs/secrets/zendesk_rccs_relay_token
